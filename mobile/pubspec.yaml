name: rosports
description: Plataforma móvil para reserva de canchas deportivas y partidos abiertos.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Supabase
  supabase_flutter: ^2.5.0

  # Estado
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navegación
  go_router: ^13.2.0

  # HTTP adicional
  dio: ^5.4.3+1

  # Firebase (Push)
  firebase_core: ^3.1.0
  firebase_messaging: ^15.0.2

  # Mapas
  google_maps_flutter: ^2.6.1

  # Pagos (WebView para redirect PayU)
  webview_flutter: ^4.7.0

  # Imágenes
  cached_network_image: ^3.3.1
  image_picker: ^1.1.1

  # Utilidades
  intl: ^0.19.0
  equatable: ^2.0.5
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.0.0
  uuid: ^4.4.0

  # UI
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0

  # Monitoreo
  sentry_flutter: ^8.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.10
  riverpod_generator: ^2.4.0
  freezed: ^2.5.2
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/
